    <script>
        // ======================= FIREBASE CONFIG =======================
        const firebaseConfig = {
            apiKey: "AIzaSyCCjWVI1hB3sbu0JiA4viW1BK81xbMML-U",
            authDomain: "csl-calculations.firebaseapp.com",
            projectId: "csl-calculations",
            storageBucket: "csl-calculations.firebasestorage.app",
            messagingSenderId: "887219643486",
            appId: "1:887219643486:web:0cb001f2c72039a00240cf"
        };

        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
        } catch (err) {
            console.log("Firebase error:", err);
        }

        // ======================= HOLIDAYS & SHIFTS =======================
        const holidays2025 = {
            "2025-08-15": "Independence Day",
            "2025-09-04": "First Onam",
            "2025-09-05": "Thiruvonam",
            "2025-09-06": "Third Onam",
            "2025-10-02": "Gandhi Jayanthi / Vijayadasami",
            "2025-10-20": "Deepavali",
            "2025-12-25": "Christmas"
        };

        const holidays2026 = {
            "2026-01-26": "Republic Day",
            "2026-03-20": "Id-ul-Fitr (Ramzan)",
            "2026-04-03": "Good Friday",
           "2026-04-09": "Vote",
           "2026-04-14": "Ambekkar",
            "2026-04-15": "Vishu",
            "2026-05-01": "May Day",
            "2026-05-27": "Id-ul-Ad'ha (Bakrid)",
            "2026-08-15": "Independence Day",
            "2026-08-26": "Thiruvonam",
            "2026-08-28": "Fourth Onam Sree Narayana Ayyankali Jayanthi",
            "2026-10-02": "Gandhi Jayanthi",
            "2026-10-21": "Vijayadasami",
            "2026-12-25": "Christmas"
        };

        const shiftTimes = {
            "A2": { start: "07:00", end: "15:20", grace: "07:05" },
            "B2": { start: "13:40", end: "22:00", grace: "13:45" },
            "C2": { start: "06:00", end: "14:00", grace: "06:05" },
            "C1": { start: "08:00", end: "16:20", grace: "08:05" }
        };

        // ======================= GLOBAL VARIABLES =======================
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();
        
        let attendanceData = JSON.parse(localStorage.getItem('attendanceData')) || {};
        let employeeData = JSON.parse(localStorage.getItem('employeeData')) || {
            name: '', code: '', 
            clTotal: 0, elTotal: 0, hplTotal: 0, specialTotal: 3, 
            lastUpdate: "2025-12-01",
            lastIncrementDate: "2025-12-01",
            settingsUpdated: false, userId: '', lastSync: 0
        };
        
        // Backward compatibility patch
        if (employeeData.cl !== undefined) {
            employeeData.clTotal = employeeData.cl || 0;
            delete employeeData.cl;
        }
        if (employeeData.el !== undefined) {
            employeeData.elTotal = employeeData.el || 0;
            delete employeeData.el;
        }
        if (employeeData.hpl !== undefined) {
            employeeData.hplTotal = employeeData.hpl || 0;
            delete employeeData.hpl;
        }
        if (employeeData.special !== undefined) {
            employeeData.specialTotal = employeeData.special || 0;
            delete employeeData.special;
        }

        employeeData.clTotal = employeeData.clTotal || 0;
        employeeData.elTotal = employeeData.elTotal || 0;
        employeeData.hplTotal = employeeData.hplTotal || 0;
        employeeData.specialTotal = employeeData.specialTotal || 0;
        employeeData.lastUpdate = employeeData.lastUpdate || "2025-12-01";
        if (!employeeData.lastIncrementDate) employeeData.lastIncrementDate = employeeData.lastUpdate;
        
        localStorage.setItem('employeeData', JSON.stringify(employeeData));
        
        let syncInProgress = false;
        let lastSyncTime = parseInt(localStorage.getItem('lastSyncTime')) || 0;
        let pendingAction = null;
        
        // Cache for current month balance
        let cachedBalance = null;
        let cachedMonthKey = null;

        // ======================= HELPER FUNCTIONS =======================
        function getMonthKey(year, month) {
            return `${year}-${String(month + 1).padStart(2, '0')}`;
        }

        // HPL deduction multiplier: full day = 2, half day = 1
        function getLeaveDeduction(leaveType, halfDay) {
            let base = halfDay === 'Yes' ? 0.5 : 1;
            if (leaveType === 'HPL') return base * 2;
            return base;
        }

        // Calculate used leaves for a given month (year, month) with HPL multiplier
        function calculateUsedLeavesForMonth(year, month) {
            let used = { cl: 0, el: 0, hpl: 0, special: 0 };
            const monthKey = getMonthKey(year, month);
            for (let dateStr in attendanceData) {
                if (!dateStr.startsWith(monthKey)) continue;
                const d = attendanceData[dateStr];
                if (!d.leave) continue;
                const lt = (d.leave || '').toUpperCase().trim();
                const deduction = getLeaveDeduction(lt, d.halfDay);
                if (lt === 'CL') used.cl += deduction;
                else if (lt === 'EL') used.el += deduction;
                else if (lt === 'HPL') used.hpl += deduction;
                else if (lt === 'SPECIAL' || lt === 'SPL') used.special += deduction;
            }
            return used;
        }

        // Calculate remaining balance at the START of a given month (year, month)
        function calculateBalanceAtMonthStart(year, month) {
            let remaining = {
                cl: employeeData.clTotal || 0,
                el: employeeData.elTotal || 0,
                hpl: employeeData.hplTotal || 0,
                special: employeeData.specialTotal || 0
            };
            const targetMonthKey = getMonthKey(year, month);
            for (let dateStr in attendanceData) {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) continue;
                const recordMonthKey = getMonthKey(date.getFullYear(), date.getMonth());
                if (recordMonthKey < targetMonthKey) {
                    const d = attendanceData[dateStr];
                    if (!d.leave) continue;
                    const lt = (d.leave || '').toUpperCase().trim();
                    const deduction = getLeaveDeduction(lt, d.halfDay);
                    if (lt === 'CL') remaining.cl = Math.max(0, remaining.cl - deduction);
                    else if (lt === 'EL') remaining.el = Math.max(0, remaining.el - deduction);
                    else if (lt === 'HPL') remaining.hpl = Math.max(0, remaining.hpl - deduction);
                    else if (lt === 'SPECIAL' || lt === 'SPL') remaining.special = Math.max(0, remaining.special - deduction);
                }
            }
            return remaining;
        }

        // Get current balance for the displayed month (with caching)
        function getLeaveBalanceForCurrentMonth() {
            const monthKey = getMonthKey(currentYear, currentMonth);
            if (cachedBalance && cachedMonthKey === monthKey) {
                return cachedBalance;
            }
            const startingBalance = calculateBalanceAtMonthStart(currentYear, currentMonth);
            const usedThisMonth = calculateUsedLeavesForMonth(currentYear, currentMonth);
            const balance = {
                cl: Math.max(0, startingBalance.cl - usedThisMonth.cl),
                el: Math.max(0, startingBalance.el - usedThisMonth.el),
                hpl: Math.max(0, startingBalance.hpl - usedThisMonth.hpl),
                special: Math.max(0, startingBalance.special - usedThisMonth.special)
            };
            cachedBalance = balance;
            cachedMonthKey = monthKey;
            return balance;
        }

        function invalidateBalanceCache() {
            cachedBalance = null;
            cachedMonthKey = null;
        }

        // ======================= EL AUTO-INCREMENT (ONCE PER MONTH) =======================
        function updateEarnedLeave() {
            const todayDate = new Date();
            const lastIncDate = new Date(employeeData.lastIncrementDate);
            let monthsDiff = (todayDate.getFullYear() - lastIncDate.getFullYear()) * 12 + 
                             (todayDate.getMonth() - lastIncDate.getMonth());
            if (monthsDiff > 0) {
                employeeData.elTotal += monthsDiff * 2.5;
                const newIncDate = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
                employeeData.lastIncrementDate = newIncDate.toISOString().split('T')[0];
                employeeData.lastUpdate = todayDate.toISOString().split('T')[0];
                localStorage.setItem('employeeData', JSON.stringify(employeeData));
                invalidateBalanceCache();
            }
        }

        // ======================= HOLIDAY / WEEKEND HELPERS =======================
        function getWeekendDates(year) {
            const weekends = [];
            for (let month = 0; month < 12; month++) {
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                let secondSat = null, fourthSat = null, satCount = 0;
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    if (date.getDay() === 6) {
                        satCount++;
                        if (satCount === 2) secondSat = day;
                        if (satCount === 4) fourthSat = day;
                    }
                }
                if (secondSat) weekends.push(`${year}-${String(month + 1).padStart(2, '0')}-${String(secondSat).padStart(2, '0')}`);
                if (fourthSat) weekends.push(`${year}-${String(month + 1).padStart(2, '0')}-${String(fourthSat).padStart(2, '0')}`);
            }
            return weekends;
        }

        const weekends2025 = getWeekendDates(2025);
        const weekends2026 = getWeekendDates(2026);

        function getHolidaysForYear(year) {
            return year === 2025 ? holidays2025 : holidays2026;
        }

        function getWeekendsForYear(year) {
            return year === 2025 ? weekends2025 : weekends2026;
        }

        function isHoliday(dateStr, dayOfWeek, date) {
            if (dayOfWeek === 0) return true;
            const holidays = getHolidaysForYear(currentYear);
            const weekends = getWeekendsForYear(currentYear);
            return holidays[dateStr] || weekends.includes(dateStr);
        }

        // ======================= UI & MODAL FUNCTIONS =======================
        function showAlert(message, title = "Message") {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
        }

        function showConfirm(action) {
            pendingAction = action;
            if (action === 'loadCloud') {
                document.getElementById('confirmTitle').textContent = "Load from Cloud";
                document.getElementById('confirmMessage').textContent = "Load all data from cloud? This will replace your local data.";
            } else if (action === 'saveCloud') {
                document.getElementById('confirmTitle').textContent = "Save to Cloud";
                document.getElementById('confirmMessage').textContent = "Save all data to cloud? This will overwrite your cloud data.";
            } else if (action === 'saveSettings') {
                document.getElementById('confirmTitle').textContent = "Save Settings";
                document.getElementById('confirmMessage').textContent = "Save settings changes?";
            }

        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
            pendingAction = null;
        }

        document.getElementById('confirmOkBtn').onclick = function() {
            if (pendingAction === 'loadCloud') loadFromCloud();
            else if (pendingAction === 'saveCloud') saveToCloud();
            else if (pendingAction === 'saveSettings') saveSettingsConfirmed();
            closeConfirmModal();
            pendingAction = null;
        };

        function packDayData(dayData) {
            if (!dayData) return "";
            return [
                dayData.shift || "",
                dayData.inPunch || "",
                dayData.outPunch || "",
                dayData.ot || "0",
                dayData.leave || "",
                dayData.halfDay || "No"
            ].join("|");
        }

        function unpackDayData(packedString) {
            if (!packedString) return null;
            const parts = packedString.split("|");
            return {
                shift: parts[0] || "",
                inPunch: parts[1] || "",
                outPunch: parts[2] || "",
                ot: parseFloat(parts[3]) || 0,
                leave: parts[4] || "",
                halfDay: parts[5] || "No"
            };
        }

        function packMonthData(attendanceData, year, month) {
            const packed = {};
            const monthStr = getMonthKey(year, month);
            for (const dateStr in attendanceData) {
                if (dateStr.startsWith(monthStr)) packed[dateStr] = packDayData(attendanceData[dateStr]);
            }
            return packed;
        }

        function unpackMonthData(packedMonthData) {
            const unpacked = {};
            for (const dateStr in packedMonthData) {
                const dayData = unpackDayData(packedMonthData[dateStr]);
                if (dayData) unpacked[dateStr] = dayData;
            }
            return unpacked;
        }

        function formatTimeFromHours(decimalHours) {
            if (!decimalHours || isNaN(decimalHours)) return '';
            const hours = Math.floor(decimalHours);
            const minutes = Math.round((decimalHours - hours) * 60);
            return `${hours}.${String(minutes).padStart(2, '0')}`;
        }

        function parseTimeToHours(timeStr) {
            if (!timeStr) return 0;
            timeStr = timeStr.trim();
            if (/^\d+$/.test(timeStr)) return parseFloat(timeStr);
            timeStr = timeStr.replace(':', '.');
            const [hours, minutes] = timeStr.split('.').map(Number);
            if (isNaN(hours)) return 0;
            if (isNaN(minutes)) return hours;
            return hours + (minutes / 60);
        }

        // ======================= CALENDAR RENDERING =======================
        function showMonth(month) {
            let newYear = currentYear, newMonth = month;
            if (month < 0) { newMonth = 11; newYear = currentYear - 1; }
            else if (month > 11) { newMonth = 0; newYear = currentYear + 1; }
            else { newMonth = month; }
            if (newYear < 2025) newYear = 2025;
            if (newYear > 2026) newYear = 2026;
            currentYear = newYear;
            currentMonth = newMonth;
            
            let calendarHTML = '';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const monthName = new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long' });

            calendarHTML += `
                <div class="month-container">
                    <button class="month-nav-btn" onclick="showMonth(currentMonth - 1)">&larr;</button>
                    <span>${monthName} ${currentYear}</span>
                    <button class="month-nav-btn" onclick="showMonth(currentMonth + 1)">&rarr;</button>
                </div>
                <div class="week-header">
                    <div>Sun</div><div>Mon</div><div>Tue</div>
                    <div>Wed</div><div>Thu</div><div>Fri</div>
                    <div>Sat</div>
                </div>
            `;

            let date = 1;
            for (let i = 0; i < 6; i++) {
                if (date > daysInMonth) break;
                calendarHTML += `<div class="week">`;
                for (let j = 0; j < 7; j++) {
                    if ((i === 0 && j < firstDay) || date > daysInMonth) {
                        calendarHTML += '<div class="day"></div>';
                    } else {
                        const currentDate = new Date(currentYear, currentMonth, date);
                        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                        let classes = 'day';
                        if (isHoliday(dateStr, j, currentDate)) classes += ' holiday';
                        if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === date) {
                            classes += ' today';
                        }
                        const dayData = attendanceData[dateStr];
                        if (dayData) {
                            if (dayData.leave) {
                                const leaveType = dayData.leave.toLowerCase();
                                if (dayData.halfDay === 'Yes') classes += ` half-day half-day-${leaveType}`;
                                else classes += ` leave leave-${leaveType}`;
                            } else if (dayData.inPunch && dayData.outPunch) classes += ' present-full';
                            else if (dayData.inPunch) classes += ' present-in';
                        }
                        const otDisplay = dayData?.ot && dayData.ot != 0 ? `<span class="ot-display">${formatTimeFromHours(dayData.ot)}h</span>` : '';
                        calendarHTML += `<div class="${classes}" onclick="showAttendancePopup('${dateStr}')">${date}${otDisplay}</div>`;
                        date++;
                    }
                }
                calendarHTML += '</div>';
            }
            document.getElementById('calendar-container').innerHTML = calendarHTML;
            updateSummaryBox();
            window.scrollTo({ top: document.getElementById('calendar-container').offsetTop - 130, behavior: 'smooth' });
        }

        // Optimized summary update (single loop)
        function updateSummaryBox() {
            let totalOT = 0, quarterlyOT = 0, nextMonthTotalOT = 0, presentDays = 0;
            const prevMonth = (currentMonth === 0 ? 11 : currentMonth - 1);
            const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
            const otStartDate = new Date(prevYear, prevMonth, 20);
            const otEndDate = new Date(currentYear, currentMonth, 20);
            const nextMonthStart = new Date(currentYear, currentMonth, 20);
            const nextMonthEnd = new Date(currentYear, currentMonth + 1, 20);
            const quarter = Math.floor(currentMonth / 3);
            const quarterStartMonth = quarter * 3;
            const quarterEndMonth = quarterStartMonth + 2;
            const quarterStart = new Date(currentYear, quarterStartMonth - 1, 20);
            const quarterEnd = new Date(currentYear, quarterEndMonth, 20);
            let hasNextMonthEntries = false;

            for (let dateStr in attendanceData) {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) continue;
                const otVal = parseFloat(attendanceData[dateStr].ot) || 0;
                if (date >= otStartDate && date < otEndDate) totalOT += otVal;
                if (date >= quarterStart && date < quarterEnd) quarterlyOT += otVal;
                if (date >= nextMonthStart && date < nextMonthEnd) {
                    nextMonthTotalOT += otVal;
                    hasNextMonthEntries = true;
                }
                if (date.getFullYear() === currentYear && date.getMonth() === currentMonth) {
                    const d = attendanceData[dateStr];
                    if (d.inPunch && d.outPunch && !isHoliday(dateStr, date.getDay(), date)) presentDays++;
                }
            }

            const usedThisMonth = calculateUsedLeavesForMonth(currentYear, currentMonth);
            const balThisMonth = getLeaveBalanceForCurrentMonth();
            const otRemaining = 75 - quarterlyOT;
            const otRemainingDisplay = otRemaining >= 0 ? `(-${otRemaining.toFixed(2)}hr)` : `(+${Math.abs(otRemaining).toFixed(2)}hr)`;
            
            let summaryHTML = `
                <p>Total OT: ${formatTimeFromHours(totalOT)} hrs</p>
                <p>Quarterly OT: ${formatTimeFromHours(quarterlyOT)} hrs <span class="ot-remaining">${otRemainingDisplay}</span></p>
            `;
            if (hasNextMonthEntries) summaryHTML += `<p>Next Month Total OT: ${formatTimeFromHours(nextMonthTotalOT)} hrs</p>`;
            summaryHTML += `
                <p>CL: ${usedThisMonth.cl.toFixed(1)} (${balThisMonth.cl.toFixed(1)})</p>
                <p>EL: ${usedThisMonth.el.toFixed(1)} (${balThisMonth.el.toFixed(1)})</p>
                <p>HPL: ${usedThisMonth.hpl.toFixed(1)} (${balThisMonth.hpl.toFixed(1)})</p>
                <p>Special: ${usedThisMonth.special} (${balThisMonth.special})</p>
                <p>Total Present Days: ${presentDays}</p>
            `;
            document.getElementById('summary-box').innerHTML = summaryHTML;
        }

            if (!employeeData.settingsUpdated) popupHTML += `<p class="leave-msg">Please update leave balance in settings tab</p>`;
            popupHTML += `
                    <div>

                        <button class="btn clear-btn" onclick="closeAttendancePopup()">Close</button>

        }

        function updateHalfDayOptions() {
            const leave = document.getElementById('leave').value;
            const halfDaySelect = document.getElementById('halfDay');
            if (leave === 'EL' || leave === 'Special') {
                halfDaySelect.value = 'No';
                halfDaySelect.disabled = true;
            } else halfDaySelect.disabled = false;
        }

        function setDefaultTimes() {
            const shift = document.getElementById('shift').value;
            const inPunch = document.getElementById('inPunch');
            const outPunch = document.getElementById('outPunch');
            if (shift && shiftTimes[shift]) {
                if (!inPunch.value) inPunch.value = shiftTimes[shift].start;
                if (!outPunch.value) outPunch.value = shiftTimes[shift].end;
            }
        }

        function saveAttendance(dateStr) {
            const inPunch = document.getElementById('inPunch').value;
            const outPunch = document.getElementById('outPunch').value;
            const otInput = document.getElementById('ot').value;
            const leave = document.getElementById('leave').value;
            const halfDay = document.getElementById('halfDay').value;
            const shift = document.getElementById('shift').value;
            let ot = parseTimeToHours(otInput);
            
            const bal = getLeaveBalanceForCurrentMonth();
            if (leave && leave !== '') {
                const deductionNeeded = getLeaveDeduction(leave, halfDay);
                const checkBalance = (type, required) => {
                    const balance = type === 'CL' ? bal.cl : type === 'EL' ? bal.el : type === 'HPL' ? bal.hpl : bal.special;
                    return (balance || 0) >= required;
                };
                const existingData = attendanceData[dateStr] || {};
                if (existingData.leave) {
                    const existingLeave = existingData.leave.toUpperCase();
                    const existingDeduction = getLeaveDeduction(existingLeave, existingData.halfDay);
                    if (existingLeave === leave) {
                        if (deductionNeeded > existingDeduction && !checkBalance(leave, deductionNeeded - existingDeduction)) {
                            showAlert(`Insufficient ${leave} balance for this change!`, "Leave Error");
                            return;
                        }
                    } else if (!checkBalance(leave, deductionNeeded)) {
                        showAlert(`Insufficient ${leave} balance!`, "Leave Error");
                        return;
                    }
                } else if (!checkBalance(leave, deductionNeeded)) {
                    showAlert(`Insufficient ${leave} balance!`, "Leave Error");
                    return;
                }
            }

            attendanceData[dateStr] = { inPunch, outPunch, ot, leave, halfDay, shift };
            localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
            invalidateBalanceCache();
            closeAttendancePopup();
            showMonth(currentMonth);
            updateSyncStatus('Changes pending');
            setTimeout(() => autoSyncCurrentMonth(), 1000);
            updateSummaryBox();
        }

        // ======================= CLOUD SYNC FUNCTIONS =======================
        async function autoSyncCurrentMonth() {
            if (!db || !employeeData.userId) return false;
            const monthKey = getMonthKey(currentYear, currentMonth);
            const lastAutoSync = localStorage.getItem(`lastAutoSync_${monthKey}`);
            const now = Date.now();
            const oneHour = 60 * 60 * 1000;
            if (lastAutoSync && (now - parseInt(lastAutoSync) < oneHour)) return false;
            try {
                updateSyncStatus('Auto-syncing...');
                const docRef = db.collection("attendance_records").doc(employeeData.userId).collection("months").doc(monthKey);
                const doc = await docRef.get();
                let cloudDataLoaded = false;
                if (doc.exists) {
                    const remoteData = doc.data();
                    const remoteTimestamp = remoteData.lastUpdated || 0;
                    let localTimestamp = 0;
                    for (let dateStr in attendanceData) {
                        if (dateStr.startsWith(monthKey)) localTimestamp = Math.max(localTimestamp, remoteTimestamp);
                    }
                    if (remoteTimestamp > localTimestamp) {
                        const packedMonthData = remoteData.monthData || {};
                        const unpackedData = unpackMonthData(packedMonthData);
                        for (let dateStr in unpackedData) attendanceData[dateStr] = unpackedData[dateStr];
                        localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
                        invalidateBalanceCache();
                        cloudDataLoaded = true;
                    }
                }
                await saveCurrentMonthToCloud();
                localStorage.setItem(`lastAutoSync_${monthKey}`, now.toString());
                updateSyncStatus('Auto-synced');
                if (cloudDataLoaded) showMonth(currentMonth);
                return true;
            } catch (error) {
                updateSyncStatus('Auto-sync failed');
                return false;
            }
        }

        async function saveCurrentMonthToCloud() {
            if (!db || !employeeData.userId) return;
            if (syncInProgress) return;
            syncInProgress = true;
            const syncBtn = document.getElementById('syncBtn');
            if (syncBtn) syncBtn.disabled = true;
            try {
                updateSyncStatus('Saving...');
                const monthKey = getMonthKey(currentYear, currentMonth);
                const packedMonthData = packMonthData(attendanceData, currentYear, currentMonth);
                await db.collection("attendance_records").doc(employeeData.userId).collection("months").doc(monthKey).set({
                    userId: employeeData.userId,
                    month: monthKey,
                    monthData: packedMonthData,
                    lastUpdated: Date.now()
                });
                updateSyncStatus('Saved to cloud');
                setTimeout(() => updateSyncStatus('Ready'), 2000);
            } catch (error) {
                updateSyncStatus('Save failed');
            } finally {
                syncInProgress = false;
                if (syncBtn) syncBtn.disabled = false;
            }
        }

        async function loadFromCloud() {
            if (!db || !employeeData.userId) { showAlert("Firebase not ready", "Cloud Error"); return; }
            try {
                updateSyncStatus('Loading all...');
                const snapshot = await db.collection("attendance_records").doc(employeeData.userId).collection("months").get();
                if (snapshot.empty) { updateSyncStatus('No cloud data'); showAlert("No data found in cloud", "Cloud Error"); return; }
                let loadedCount = 0;
                snapshot.forEach(doc => {
                    const monthData = doc.data();
                    const unpackedData = unpackMonthData(monthData.monthData || {});
                    for (let dateStr in unpackedData) attendanceData[dateStr] = unpackedData[dateStr];
                    loadedCount++;
                });
                localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
                invalidateBalanceCache();
                showMonth(currentMonth);
                updateSyncStatus(`Loaded ${loadedCount} months`);
                setTimeout(() => updateSyncStatus('Ready'), 2000);
                showAlert(`Successfully loaded ${loadedCount} months from cloud`, "Cloud Success");
            } catch (error) {
                updateSyncStatus('Load failed');
                showAlert("Failed to load from cloud: " + error.message, "Cloud Error");
            }
        }

        async function saveToCloud() {
            if (!db || !employeeData.userId) { showAlert("Firebase not ready", "Cloud Error"); return; }
            syncInProgress = true;
            const syncBtn = document.getElementById('syncBtn');
            if (syncBtn) syncBtn.disabled = true;
            try {
                updateSyncStatus('Saving all...');
                const monthMap = {};
                for (let dateStr in attendanceData) {
                    const monthKey = dateStr.substring(0, 7);
                    if (!monthMap[monthKey]) monthMap[monthKey] = {};
                    monthMap[monthKey][dateStr] = attendanceData[dateStr];
                }
                let savedCount = 0;
                for (let monthKey in monthMap) {
                    const packedMonthData = {};
                    for (let dateStr in monthMap[monthKey]) packedMonthData[dateStr] = packDayData(monthMap[monthKey][dateStr]);
                    await db.collection("attendance_records").doc(employeeData.userId).collection("months").doc(monthKey).set({
                        userId: employeeData.userId,
                        month: monthKey,
                        monthData: packedMonthData,
                        lastUpdated: Date.now()
                    });
                    savedCount++;
                }
                updateSyncStatus(`Saved ${savedCount} months`);
                setTimeout(() => updateSyncStatus('Ready'), 2000);
                showAlert(`Successfully saved ${savedCount} months to cloud`, "Cloud Success");
            } catch (error) {
                updateSyncStatus('Save failed');
                showAlert("Failed to save to cloud: " + error.message, "Cloud Error");
            } finally {
                syncInProgress = false;
                if (syncBtn) syncBtn.disabled = false;
            }
        }

        async function autoSync() {
            if (!db || !employeeData.userId) { showAlert("Cloud sync not available", "Sync Error"); return; }
            if (syncInProgress) return;
            syncInProgress = true;
            updateSyncStatus('Syncing...');
            try {
                await autoSyncCurrentMonth();
                updateSyncStatus('Synced successfully');
                setTimeout(() => updateSyncStatus('Ready'), 2000);
            } catch (error) {
                updateSyncStatus('Sync failed');
                showAlert("Sync failed: " + error.message, "Sync Error");
            } finally {
                syncInProgress = false;
            }
        }

        function updateSyncStatus(status) {
            const statusElem = document.getElementById('syncStatus');
            if (statusElem) {
                statusElem.textContent = status || 'Offline';
                if (status === 'Ready' || status === 'Synced successfully' || status === 'Auto-synced') statusElem.style.color = '#4CAF50';
                else if (status.includes('...') || status === 'Syncing...' || status === 'Auto-syncing...') statusElem.style.color = '#FF9800';
                else if (status.includes('failed') || status.includes('Failed')) statusElem.style.color = '#f44336';
                else statusElem.style.color = '#ffffff';
            }
        }

        function generateMonthlyPDF() {
            try {
                const monthName = new Date(currentYear, currentMonth).toLocaleString('default', { month: 'long' });
                let tableData = [];
                let totalLeave = 0, totalOT = 0, totalPresent = 0;
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const data = attendanceData[dateStr] || {};
                    const dateObj = new Date(currentYear, currentMonth, d);
                    const isHol = isHoliday(dateStr, dateObj.getDay(), dateObj);
                    const leaveStr = data.leave ? `${data.leave}${data.halfDay === 'Yes' ? ' (Half)' : ''}` : (isHol ? 'Holiday' : '');
                    if (data.leave) totalLeave += getLeaveDeduction(data.leave, data.halfDay);
                    else if (data.inPunch && data.outPunch && !isHol) totalPresent += 1;
                    if (data.ot) totalOT += parseFloat(data.ot) || 0;
                    tableData.push({
                        date: dateStr, shift: data.shift || '', inTime: data.inPunch || '',
                        outTime: data.outPunch || '', leave: leaveStr,
                        ot: data.ot ? `${formatTimeFromHours(data.ot)} hrs` : '0',
                        isHoliday: isHol, leaveType: (data.leave || '').toLowerCase()
                    });
                }
                const pdfData = {
                    name: employeeData.name || 'Unknown', code: employeeData.code || 'Unknown',
                    month: `${monthName} ${currentYear}`, table: tableData,
                    totalLeave: totalLeave.toFixed(1), totalOT: formatTimeFromHours(totalOT),
                    totalPresent: totalPresent
                };
                const encodedData = encodeURIComponent(JSON.stringify(pdfData));
                window.location.href = `openchrome://vishnuputhur.github.io/cslv2/atnpdf.html?data=${encodedData}`;
            } catch (error) { showAlert('Failed to generate PDF: ' + error.message, "PDF Error"); }
        }

        // ======================= APP INITIALIZATION =======================
        function initApp() {
            if (!employeeData.name || !employeeData.code) {
                showUserRegisterModal();
                return;
            }
            if (!employeeData.userId) {
                employeeData.userId = generateUserId(employeeData.name, employeeData.code);
                localStorage.setItem('employeeData', JSON.stringify(employeeData));
            }
            updateEarnedLeave();
            loadSettings();
            showMonth(currentMonth);
            updateSyncStatus('Ready');
            setTimeout(() => {
                autoSyncCurrentMonth().catch(e => console.log("Auto-sync deferred failed", e));
            }, 500);
        }

        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('custom-modal')) e.target.style.display = 'none';
            if (e.target.classList.contains('custom-message-modal')) e.target.style.display = 'none';
        });

        window.addEventListener('DOMContentLoaded', initApp);
    </script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw-atn.js');
  }
</script>

</body>
</html>
